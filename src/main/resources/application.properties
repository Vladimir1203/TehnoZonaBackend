# Naziv aplikacije
spring.application.name=TehnoZonaSpring

# Putanja do JSON fajla (ako koristi? stati?ki fajl unutar JAR-a)
app.data.products-file=classpath:static/data/products.json

# Konfiguracija baze (dinamički kroz ENV varijable sa fallback-om za lokal)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA pode?avanja
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


