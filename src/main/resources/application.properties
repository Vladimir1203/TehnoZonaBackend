# Naziv aplikacije
spring.application.name=TehnoZonaSpring

# Putanja do JSON fajla (ako koristi? stati?ki fajl unutar JAR-a)
app.data.products-file=classpath:static/data/products.json

# Konfiguracija baze (dinamički kroz ENV varijable sa fallback-om za lokal)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA pode?avanja
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


#emailing
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=vladimir12934@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
#spring.mail.test-connection=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Putanja za slike kategorija
category.images.path=category-images

# Dozvoli specijalne karaktere u URL-u (bitno za kategorije sa \)
server.tomcat.relaxed-path-chars=\\,[,],|
server.tomcat.relaxed-query-chars=\\,[,],|

